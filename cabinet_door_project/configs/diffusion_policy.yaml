# Training configuration for the OpenCabinet policy
# ──────────────────────────────────────────────────
# Default policy_type is "diffusion" (action-chunked minimal diffusion policy).
# Switch to "mlp" for the simple baseline (will get ~0% success rate).

# ── Common ────────────────────────────────────────
learning_rate: 0.0001
checkpoint_dir: /tmp/cabinet_policy_checkpoints
checkpoint_every_n_epochs: 1
save_last_checkpoint: true

# ── Diffusion Policy settings ─────────────────────
# Used when --policy_type diffusion (the default)
epochs: 200
batch_size: 256
chunk_size: 8          # Number of future actions predicted at once
n_action_steps: 4      # How many of those to execute before re-planning
n_diffusion_steps: 50  # DDPM noise schedule steps
hidden_dim: 256        # Width of MLP layers in noise predictor

# ── MLP Baseline settings ─────────────────────────
# Used when --policy_type mlp
# epochs: 50
# batch_size: 64

